# Builder — Public Compose Configuration
#
# Usage:
#   docker compose up -d                    # Start PostgreSQL + Builder
#   docker compose run builder --help       # Run builder with arguments
#   docker compose run builder              # Interactive mode
#
# Mount your project by setting BUILDER_PROJECT_DIR:
#   BUILDER_PROJECT_DIR=/path/to/project docker compose run builder
#
# PostgreSQL is the sole storage backend.

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: builder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "1207:5432"
    volumes:
      - builder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d builder"]
      interval: 5s
      timeout: 3s
      retries: 5

  builder:
    image: agnusdei1207/builder:latest
    container_name: builder-app
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BUILDER_DATABASE_URL: "postgres://postgres:postgres@postgres:5432/builder"
    volumes:
      - ${BUILDER_PROJECT_DIR:-.}:/workspace
    working_dir: /workspace

volumes:
  builder_pgdata:
